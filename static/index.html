<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>千问 · 灵动AI助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 30% 20%, #f4f7fc, #e6ecf5);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }

    /* 主玻璃面板 */
    .glass-panel {
      width: 100%;
      max-width: 880px;
      height: 92vh;
      max-height: 950px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 42px;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.07), 0 12px 28px rgba(22, 119, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.7);
      transition: all 0.2s ease;
    }

    /* 头部 */
    .header {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .ai-avatar {
      background: linear-gradient(145deg, #1677ff, #3b8cff);
      width: 46px;
      height: 46px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 12px 20px -10px rgba(22, 119, 255, 0.45);
    }

    .header-text {
      flex: 1;
    }

    .header-title {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.4px;
      background: linear-gradient(to right, #13273e, #1f3b58);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-sub {
      font-size: 0.8rem;
      color: #5d718b;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .online-dot {
      width: 9px;
      height: 9px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
    }

    /* 聊天区域 */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar {
      width: 5px;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(22, 119, 255, 0.25);
      border-radius: 10px;
    }

    .message {
      display: flex;
      animation: fadeInUp 0.28s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      justify-content: flex-end;
    }
    .bot-message {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 78%;
      padding: 14px 20px;
      border-radius: 26px;
      line-height: 1.6;
      font-size: 0.95rem;
      word-wrap: break-word;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.04);
      transition: all 0.2s;
      white-space: pre-wrap; /* 保留换行和空格，但允许自动换行 */
    }

    .user-message .message-bubble {
      background: linear-gradient(135deg, #1677ff, #2d86ff);
      color: white;
      border-bottom-right-radius: 8px;
      box-shadow: 0 10px 20px -8px rgba(22, 119, 255, 0.5);
    }

    .bot-message .message-bubble {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #1e2b3c;
      border-bottom-left-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    /* 文本内部样式强化：代码块、列表等 */
    .bot-message .message-bubble pre {
      background: rgba(0, 0, 0, 0.04);
      padding: 12px 14px;
      border-radius: 16px;
      margin: 10px 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 4px solid #1677ff;
      color: #0b1f3b;
    }

    .bot-message .message-bubble code {
      background: rgba(22, 119, 255, 0.08);
      padding: 2px 7px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.9em;
      color: #0d3b6e;
    }

    .bot-message .message-bubble ul,
    .bot-message .message-bubble ol {
      margin: 8px 0 8px 18px;
      padding-left: 6px;
    }

    .bot-message .message-bubble li {
      margin-bottom: 5px;
    }

    .bot-message .message-bubble strong {
      color: #0a2540;
      font-weight: 600;
    }

    .bot-message .message-bubble blockquote {
      border-left: 4px solid #1677ff;
      padding-left: 16px;
      margin: 10px 0;
      color: #2c3e5c;
      font-style: italic;
      background: rgba(22,119,255,0.03);
      border-radius: 0 12px 12px 0;
    }

    /* 输入区域 */
    .input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px 18px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-top: 1px solid rgba(255, 255, 255, 0.75);
      margin: 0 8px 10px;
      border-radius: 32px;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.9);
      padding: 0 12px 0 18px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .input-wrapper:focus-within {
      box-shadow: 0 0 0 3px rgba(22,119,255,0.3);
      border-color: rgba(22,119,255,0.7);
    }

    #userInput {
      flex: 1;
      padding: 14px 0;
      border: none;
      background: transparent;
      font-size: 0.98rem;
      outline: none;
      color: #121926;
    }

    #userInput::placeholder {
      color: #8d9db0;
    }

    .send-btn {
      background: #1677ff;
      border: none;
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 10px 18px -8px #1677ff;
      font-size: 1.1rem;
      margin-left: 4px;
    }

    .send-btn:hover {
      background: #0f5ed0;
      transform: scale(1.02);
    }

    .send-btn:disabled {
      background: #b3d4ff;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* 加载动画 */
    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 0.9rem;
      color: #2c3e50;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: #1677ff;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-7px); opacity: 1; }
    }
  </style>
</head>
<body>
<div class="glass-panel">
  <div class="header">
    <div class="ai-avatar"><i class="fas fa-robot"></i></div>
    <div class="header-text">
      <div class="header-title">千问 · 灵动</div>
      <div class="header-sub"><span class="online-dot"></span> 智能排版 · 随时在线</div>
    </div>
    <div style="color:#5c6f89;"><i class="far fa-edit"></i></div>
  </div>

  <div class="chat-container" id="chatContainer"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <i class="far fa-keyboard" style="color:#8899b0; margin-right:8px;"></i>
      <input type="text" id="userInput" placeholder="输入消息，支持换行和代码..." autocomplete="off">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script>
  (function() {
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 高级文本处理：将纯文本转换为带排版的HTML
    function formatBotText(text) {
      if (!text) return '';
      
      // 1. 先转义HTML特殊字符，防止XSS
      let escaped = String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // 2. 处理代码块 (``` ... ```) 转换为 <pre><code>
      escaped = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
        // 去掉语言标识可能的多余空格
        return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
      });

      // 3. 处理行内代码 `code` 
      escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 4. 处理粗体 **text** 或 __text__
      escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      escaped = escaped.replace(/__(.*?)__/g, '<strong>$1</strong>');

      // 5. 处理斜体 *text*  (但避免与列表冲突，简单处理)
      escaped = escaped.replace(/\*(.*?)\*/g, '<em>$1</em>');

      // 6. 处理无序列表：以 - 或 * 开头 (但先保留已转换的)
      // 将行首的 - 或 * 转换为 <ul><li>...</li></ul>
      // 分步骤：识别连续列表项
      const lines = escaped.split('\n');
      let inUl = false;
      let inOl = false;
      let result = [];
      
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        // 无序列表检测 (以 - 或 * 开头，且前面没有其他字符)
        if (/^\s*[\-\*]\s+/.test(line)) {
          if (!inUl) {
            result.push('<ul>');
            inUl = true;
          }
          // 去掉标记符号，保留内容
          const content = line.replace(/^\s*[\-\*]\s+/, '');
          result.push('<li>' + content + '</li>');
          continue;
        } else if (inUl) {
          // 结束无序列表
          result.push('</ul>');
          inUl = false;
        }
        
        // 有序列表检测 (以 1. 2. 等开头)
        if (/^\s*\d+\.\s+/.test(line)) {
          if (!inOl) {
            result.push('<ol>');
            inOl = true;
          }
          const content = line.replace(/^\s*\d+\.\s+/, '');
          result.push('<li>' + content + '</li>');
          continue;
        } else if (inOl) {
          result.push('</ol>');
          inOl = false;
        }
        
        // 处理引用块 (> 开头)
        if (/^\s*&gt;\s?/.test(line)) {
          const quoteContent = line.replace(/^\s*&gt;\s?/, '');
          result.push('<blockquote>' + quoteContent + '</blockquote>');
          continue;
        }
        
        // 普通行
        result.push(line);
      }
      
      // 关闭未闭合的列表
      if (inUl) result.push('</ul>');
      if (inOl) result.push('</ol>');
      
      escaped = result.join('\n');

      // 7. 将剩余的换行转换为 <br> 但保留块级元素后面的换行不重复转换
      // 简单方法：用正则把非标签间的换行转为<br>
      escaped = escaped.replace(/\n/g, '<br>');
      
      // 清理可能多余的 <br> 在块级元素前后 (简单优化)
      escaped = escaped.replace(/<br>\s*<(pre|ul|ol|blockquote)/g, '<$1');
      escaped = escaped.replace(/<\/(pre|ul|ol|blockquote)>\s*<br>/g, '</$1>');
      
      return escaped;
    }

    // 添加消息（用户消息无需复杂排版，机器人消息使用富文本）
    function addMessage(text, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}-message`;
      
      let bubbleContent;
      if (role === 'bot') {
        // 机器人消息：使用格式化函数
        bubbleContent = formatBotText(text);
      } else {
        // 用户消息：保留基本换行，转义
        bubbleContent = String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
      }
      
      messageDiv.innerHTML = `<div class="message-bubble">${bubbleContent}</div>`;
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addLoadingIndicator() {
      const div = document.createElement('div');
      const id = 'load-' + Date.now();
      div.id = id;
      div.className = 'message bot-message';
      div.innerHTML = `<div class="loading-indicator"><div class="typing-dots"><span></span><span></span><span></span></div>分析中</div>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return id;
    }

    function removeLoadingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function setSendEnabled(enable) {
      sendBtn.disabled = !enable;
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg) return;
      
      addMessage(msg, 'user');
      userInput.value = '';
      setSendEnabled(false);
      
      const loadingId = addLoadingIndicator();
      
      try {
        const response = await fetch(`/chat?msg=${encodeURIComponent(msg)}`);
        if (!response.ok) throw new Error('状态码 ' + response.status);
        const data = await response.json();
        removeLoadingIndicator(loadingId);
        
        if (data && data.reply) {
          addMessage(data.reply, 'bot');
        } else {
          addMessage('（收到空响应）', 'bot');
        }
      } catch (err) {
        removeLoadingIndicator(loadingId);
        addMessage('⚠️ 网络或服务异常，请稍后重试。', 'bot');
      } finally {
        setSendEnabled(true);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 初始欢迎语（展示排版效果）
    window.addEventListener('load', () => {
      if (chatContainer.children.length === 0) {
        const welcomeMsg = `✨ 欢迎使用千问AI助手！\n\n我可以帮你：\n- 编写代码片段\n- 解释复杂概念\n- 生成创意文案\n\n试试输入 \`/help\` 或直接提问吧！\n\n> “智能，从对话开始。”`;
        addMessage(welcomeMsg, 'bot');
      }
    });
  })();
</script>
</body>
</html>
